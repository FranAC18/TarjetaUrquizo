<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <!-- SEO -->
    <title id="page-title">Fredy Urquizo Fotografía - Tarjeta Digital</title>
    <meta name="description" id="page-desc"
        content="Fotógrafo especializado en documentar la magia de los XV años. Captura momentos únicos e inolvidables.">

    <!-- Open Graph (Facebook, WhatsApp, etc.) -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://tusitio.com/">
    <meta property="og:title" content="Fredy Urquizo Fotografía">
    <meta property="og:description" content="Fotógrafo especializado en documentar la magia de los XV años.">
    <meta property="og:image" content="https://tusitio.com/assets/img/fotourquizo.jpeg">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Fredy Urquizo Fotografía">
    <meta name="twitter:description" content="Fotografía profesional de XV años.">
    <meta name="twitter:image" content="https://tusitio.com/assets/img/fotourquizo.jpeg">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Iconos -->
    <link rel="icon" type="image/png" href="assets/img/iconourquizo.png">
    <link rel="apple-touch-icon" href="assets/img/fotourquizo.jpeg">

    <!-- Estilos -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Background Blur Shapes -->
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>
    <div class="bg-shape shape-3"></div>

    <main class="card-container">
        <!-- 8.1 Header (Identidad) -->
        <header class="profile-header fade-in">
            <div class="profile-image-wrapper">
                <div class="profile-image-blur" id="profile-blur"></div>
                <!-- El onerror previene errores si la imagen no existe y carga un fallback local/remoto -->
                <img src="" alt="Profile Image" id="profile-image" class="profile-image"
                    onerror="this.src='assets/img/podovyda.png'">
            </div>
            <h1 id="profile-name" class="profile-name"></h1>
            <h2 id="profile-title" class="profile-title"></h2>
            <p id="profile-description" class="profile-description"></p>
        </header>

        <!-- 8.2 Acciones Rápidas -->
        <section class="quick-actions fade-in staggered-1" id="quick-actions">
            <!-- Inyectado mediante data.js y script.js -->
        </section>

        <!-- 8.3 Botón Principal (Save Contact) -->
        <section class="main-action fade-in staggered-2">
            <button id="save-contact-btn" class="primary-btn">
                Guardar contacto
            </button>
        </section>

        <!-- Separador sutil -->
        <hr class="section-divider fade-in staggered-3">

        <!-- 8.4 Redes Sociales -->
        <section class="social-links fade-in staggered-3" id="social-links">
            <!-- Inyectado mediante data.js y script.js -->
        </section>

        <!-- Separador sutil -->
        <hr class="section-divider fade-in staggered-4">

        <!-- 15. Botón Compartir -->
        <section class="share-section fade-in staggered-5">
            <button id="share-btn" class="secondary-btn">
                Compartir Tarjeta
            </button>
        </section>

    </main>

    <!-- Archivo de Configuración de Datos (DEBE ir antes de script.js) -->
    <script src="data.js"></script>

    <!-- Custom JS -->
    <script src="script.js"></script>
</body>

</html>
